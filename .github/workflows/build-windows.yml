name: Build Windows .exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python + backend bundle ───────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies + PyInstaller
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend bundle (PyInstaller)
        working-directory: backend
        run: pyinstaller bio_pro.spec --clean --noconfirm

      - name: Copy backend bundle into Tauri resource slot
        shell: powershell
        run: |
          $src = "backend\dist\backend-server"
          $dst = "src-tauri\backend-server-dist\backend-server"
          if (Test-Path $dst) { Remove-Item -Recurse -Force $dst }
          New-Item -ItemType Directory -Force -Path (Split-Path $dst) | Out-Null
          Copy-Item -Recurse -Force $src $dst

      # ── Node / frontend ───────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # ── Rust (required by Tauri core compilation) ─────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── Tauri build via npm CLI (avoids long cargo-install step) ─────────────
      - name: Build Tauri app (NSIS installer)
        working-directory: frontend
        run: npm run tauri:build

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload NSIS installer (.exe setup)
        uses: actions/upload-artifact@v4
        with:
          name: BiologicalCompiler-Windows-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload portable .exe
        uses: actions/upload-artifact@v4
        with:
          name: BiologicalCompiler-Windows-Portable
          path: src-tauri/target/release/bio-pro.exe
          if-no-files-found: ignore
          retention-days: 30
